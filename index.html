<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano MIDI Visualizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Layer 1 (bottom): WebGL fluid simulation -->
  <canvas id="fluid-canvas"></canvas>

  <!-- Layer 2 (middle): 2D note highway -->
  <canvas id="highway-canvas"></canvas>

  <!-- Layer 3 (top): UI overlay -->
  <div id="ui">
    <div id="header">
      <span id="title">Piano MIDI Visualizer</span>
      <button id="settings-btn" title="Settings">&#9881;</button>
      <button id="midi-btn" title="MIDI Input">MIDI</button>
      <span id="midi-status" class="status-dot disconnected"></span>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel" class="hidden">
      <h2>Settings</h2>

      <section>
        <h3>Appearance</h3>
        <label>
          Note color
          <input type="color" id="note-color" value="#4488ff">
        </label>
        <label>
          Speed (px/s)
          <input type="range" id="speed" min="50" max="800" step="10" value="300">
          <span id="speed-val">300</span>
        </label>
        <label>
          Note width
          <input type="range" id="note-width" min="4" max="32" step="1" value="12">
          <span id="note-width-val">12</span>
        </label>
      </section>

      <section>
        <h3>Fluid Effect</h3>
        <label>
          <input type="checkbox" id="fluid-enabled" checked> Enable fluid overlay
        </label>
        <label>
          Intensity
          <input type="range" id="fluid-intensity" min="0" max="200" step="5" value="100">
          <span id="fluid-intensity-val">100%</span>
        </label>
        <label>
          Dissipation
          <input type="range" id="density-dissipation" min="1" max="40" step="1" value="10">
          <span id="density-dissipation-val">1.0</span>
        </label>
        <label>
          Velocity dissipation
          <input type="range" id="velocity-dissipation" min="1" max="40" step="1" value="2">
          <span id="velocity-dissipation-val">0.2</span>
        </label>
        <label>
          Curl (vorticity)
          <input type="range" id="curl" min="0" max="50" step="1" value="30">
          <span id="curl-val">30</span>
        </label>
        <label>
          Splat size
          <input type="range" id="fluid-radius" min="0.1" max="15" step="0.1" value="2">
          <span id="fluid-radius-val">2</span>
        </label>
      </section>

      <section>
        <h3>Keyboard</h3>
        <label>
          <input type="checkbox" id="show-keyboard" checked> Show keyboard
        </label>
        <label>
          Keyboard height
          <input type="range" id="keyboard-height" min="40" max="200" step="5" value="80">
          <span id="keyboard-height-val">80</span>
        </label>
      </section>

      <section>
        <h3>MIDI</h3>
        <div id="midi-inputs-list">No MIDI devices found</div>
        <p class="hint">QWERTY keyboard: A S D F G H J K L mapped to white keys starting at C4</p>
      </section>

      <button id="settings-close">Close</button>
    </div>

    <div id="note-readout" aria-live="polite"></div>

    <!-- Piano keyboard overlay (bottom of screen) -->
    <canvas id="piano-canvas"></canvas>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
